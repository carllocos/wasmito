name: wasmito Tests

on: [push]

jobs:
  linting:
    uses: ./.github/workflows/lint.yml
  test-wasmito:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    needs: [linting]

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install Rust v1.76.0
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable, 1.76.0
          target: wasm32-unknown-unknown

      - name: Install cargo-binstall
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash -s -- -y

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: 23

      - name: Install and Build Wasmito
        run: |
          echo "Running installation script"
          bash ./scripts/install.sh

      - name: Test Wasmito
        run: |
          npm run test

  test-wasmito-hooks:
    runs-on: self-hosted
    needs: [test-wasmito]
    steps:
      - name: Install and Build Wasmito
        run: |
          echo "Running installation script"
          bash ./scripts/install.sh

      - name: Test Hooks on MCU
        run: |
          npm run test-hooks

  run-bl-cfg-benchmarks:
    runs-on: ubuntu-latest
    needs: [test-wasmito]
    steps:
      - name: trigger run of CFG benchmarks
        run: |
          curl -L \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{secrets.TRIGGER_BENCH}}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/carllocos/language-agnostic-benchmark/actions/workflows/bench.yml/dispatches \
              -d '{"ref":"main"}'
