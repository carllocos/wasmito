name: wasmito Tests

on: [push]

jobs:
  test-wasmito:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install Rust v1.76.0
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable, 1.76.0
          target: wasm32-unknown-unknown

      - name: Install wasm-tools v1.205.0
        uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: wasm-tools@1.205.0

      # - name: Install cargo-binstall (timeout after 2m)
      #   if: matrix.os == 'ubuntu-latest'
      #   timeout-minutes: 2
      #   run: |
      #     curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      # - name: Install wasm-tools v1.205.0
      #   if: matrix.os == 'ubuntu-latest'
      #   run: cargo binstall wasm-tools --no-confirm --version 1.205.0

      # # Using curl to install wasm-tools timesout in osx
      # - name: Install wasm-tools v1.205.0
      #   if: matrix.os == 'macos-latest'
      #   run: cargo install wasm-tools --version 1.205.0

      - name: Build submodules
        run: |
          echo "Running installation script"
          bash ./install.sh

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: 16

      - name: Install dependencies
        run: npm install

      - name: build TS
        run: npx tsc

      - name: yarn install and test
        run: |
          yarn 
          yarn test

      - name: trigger run of CFG benchmarks
        run: |
          curl -L \
               -X POST \
               -H "Accept: application/vnd.github+json" \
               -H "Authorization: Bearer ${{secrets.TRIGGER_BENCH}}" \
               -H "X-GitHub-Api-Version: 2022-11-28" \
               https://api.github.com/repos/carllocos/language-agnostic-benchmark/actions/workflows/bench.yml/dispatches \
               -d '{"ref":"main"}'
