name: wasmito Tests

on: [push]

jobs:
  test-wasmito:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install Rust v1.80.1
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- --default-toolchain 1.80.1 -y
          source "$HOME/.cargo/env" 
          rustc --version

      - name: Install wasm32 targets
        run: |
          rustup target add wasm32-unknown-unknown

      - name: Install cargo-binstall
        run: |
          timeout 2m curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install wasm-tools v1.205.0
        run: cargo binstall wasm-tools --no-confirm --version 1.205.0

      - name: Build submodules
        run: |
          echo "Running installation script"
          bash ./install.sh

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: 16

      - name: Install dependencies
        run: npm install

      - name: build TS
        run: npx tsc

      - name: yarn install and test
        run: |
          yarn 
          yarn test
